# local-ci configuration for Rust project
# See: https://github.com/stevedores-org/local-ci

[project]
name = "worry-free-crab"
type = "rust"

[cache]
skip_dirs = [".git", "target", ".github", "scripts", ".claude", "node_modules"]
include_patterns = ["*.rs", "*.toml", "*.lock"]

[stages.fmt]
command = ["cargo", "fmt", "--all", "--", "--check"]
fix_command = ["cargo", "fmt", "--all"]
timeout = 120
enabled = true

[stages.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--", "-D", "warnings"]
timeout = 600
enabled = true

[stages.test]
command = ["cargo", "test", "--workspace"]
timeout = 1200
enabled = true

[stages.check]
command = ["cargo", "check", "--workspace"]
timeout = 600
enabled = false

[dependencies]
optional = []

[workspace]
exclude = []
