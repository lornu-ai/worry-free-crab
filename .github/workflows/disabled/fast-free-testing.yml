# Fast-Free-Testing CI
# Replaces GitHub Actions with AWS Lambda-backed FFT for zero-cost, ultra-fast checks
# Triggers on: PR open/sync/reopen, pushes to main

name: fast-free-testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  trigger:
    name: trigger fast-free-testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger FFT checks
        env:
          FFT_WEBHOOK_URL: ${{ secrets.FAST_FREE_TESTING_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PAYLOAD=$(jq -nc \
            --arg action "synchronize" \
            --argjson pr_number ${{ github.event.pull_request.number }} \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg head_ref "${{ github.event.pull_request.head.ref }}" \
            --arg base_ref "${{ github.event.pull_request.base.ref }}" \
            --arg repo_name "${{ github.event.repository.name }}" \
            --arg owner "${{ github.event.repository.owner.login }}" \
            --arg full_name "${{ github.event.repository.full_name }}" \
            --arg token "${{ secrets.GITHUB_TOKEN }}" \
            '{
              action: $action,
              token: $token,
              pull_request: {
                number: $pr_number,
                head: { sha: $head_sha, ref: $head_ref },
                base: { ref: $base_ref }
              },
              repository: {
                name: $repo_name,
                owner: { login: $owner },
                full_name: $full_name
              }
            }')

          if [ -z "$FFT_WEBHOOK_URL" ]; then
            echo "::warning::FAST_FREE_TESTING_WEBHOOK_URL not set — skipping fast-free-testing trigger"
            exit 0
          fi

          STATUS=$(curl -s -o /tmp/fft-response.json -w "%{http_code}" \
            -X POST "$FFT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "fast-free-testing response: HTTP $STATUS"
          cat /tmp/fft-response.json

          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 202 ]; then
            echo "::warning::fast-free-testing returned HTTP $STATUS — checks may not appear"
          fi

  rust-checks:
    name: rust-checks (FFT aggregator)
    runs-on: ubuntu-latest
    needs: trigger
    if: always()
    permissions:
      checks: write
      contents: read
      statuses: read
    steps:
      - name: Wait for fast-free-testing checks to complete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          max_attempts=120
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if ! response=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha || github.sha }}/statuses 2>&1); then
              echo "Waiting for Deterministic Gate status... (API error: $response) (attempt $((attempt+1))/$max_attempts)"
              sleep 1
              attempt=$((attempt+1))
              continue
            fi

            result=$(echo "$response" | jq '.[] | select(.context == "Deterministic Gate")' 2>/dev/null || echo "")

            if [ -z "$result" ]; then
              echo "Waiting for Deterministic Gate status... (attempt $((attempt+1))/$max_attempts)"
              sleep 1
              attempt=$((attempt+1))
              continue
            fi

            state=$(echo "$result" | jq -r '.state' | head -n 1)

            if [ "$state" = "failure" ] || [ "$state" = "error" ]; then
              echo "::error::Deterministic Gate status FAILED"
              exit 1
            elif [ "$state" = "success" ]; then
              echo "✓ Deterministic Gate status PASSED"
              exit 0
            fi

            echo "Deterministic Gate status is $state... (attempt $((attempt+1))/$max_attempts)"
            sleep 1
            attempt=$((attempt+1))
          done

          echo "::error::Timeout waiting for fast-free-testing checks after ${max_attempts}s"
          exit 1
