# worry-free-crab (local-ci) propel contract
# Defines how Propel should orchestrate checks for this repo

[repo]
owner = "lornu-ai"
name = "worry-free-crab"
description = "Lightweight local CI runner (Rust rewrite)"

# Fast Free Testing (FFT) check contract — replaces the legacy local-ci stages.
# Hermetic checks via Nix flake; names match flake.nix `checks` and FFT's
# orchestrator so the NixOS runner can dispatch each one.
[[check]]
name = "type-safety"
description = "cargo fmt --check + cargo check + clippy (warnings as errors)"
command = "nix build .#checks.x86_64-linux.type-safety"
timeout_seconds = 600
required = true

[[check]]
name = "unit-tests"
description = "Cargo workspace test suite"
command = "nix build .#checks.x86_64-linux.unit-tests"
timeout_seconds = 1200
required = true

[[check]]
name = "secrets"
description = "Secret detection with gitleaks"
command = "nix build .#checks.x86_64-linux.secrets"
timeout_seconds = 120
required = true

[[check]]
name = "config-lint"
description = "No hardcoded localhost URLs or inline passwords"
command = "nix build .#checks.x86_64-linux.config-lint"
timeout_seconds = 60
required = true

[oci]
enabled = false

[policy]
# Every PR requires at least one human approving review before it can merge.
# Enforced on the GitHub side by branch protection on `main`
# (required_pull_request_reviews.required_approving_review_count = 1).
requires_human_approval = true
secrets_scope = "ci/repos/lornu-ai/worry-free-crab"
allowed_orgs = ["lornu-ai", "stevedores-org"]
allowed_refs = ["refs/heads/main"]

[performance]
cache = "attic"
cache_url = "https://attic.lornu.ai"
