# propel.toml — worry-free-crab CI validation
# Reference: lornu-ai/ci-checks#4
[project]
name = "worry-free-crab"
repo = "lornu-ai/worry-free-crab"

[[check]]
name = "fmt"
command = ["cargo", "fmt", "--", "--check"]
timeout = 120

[[check]]
name = "clippy"
command = ["cargo", "clippy", "--", "-D", "warnings"]
timeout = 180

[[check]]
name = "test"
command = ["cargo", "test"]
timeout = 300

[policy]
requires_human_approval = false

[propel]
enabled = true
provider = "propel.aivcs.io"
github_status_checks = true
github_pr_comments = true
